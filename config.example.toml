# cortex — example config
# Copy this to ~/.cortex/config.toml and fill in your values.
# Or run: cortex config --init

# ── LLM local (Ollama) ──────────────────────────────────────────────────────
model = "ollama/qwen3:8b"                     # best tool-use + reasoning (recommended)
planner_model = "ollama/qwen3:4b"             # fast local router (optional)
ollama_base_url = "http://localhost:11434"
max_tokens = 8192          # max output tokens — big enough to write a full file in one go
num_ctx = 16384            # Ollama context window — must fit prompt + the file being written
                           # (larger = more VRAM; lower to 8192 if you run out of memory)
temperature = 0.1
max_iterations = 20

# ── Orchestration ───────────────────────────────────────────────────────────
orchestrator_enabled = true
max_parallel_agents = 4
direct_answer_enabled = true   # answer pure questions directly, no agent/tools

# ── Voice (dictation) ────────────────────────────────────────────────────────
# Used by `cortex voice` and the /voice chat command. Needs: pip install ".[voice]"
voice_language = "es-ES"       # e.g. es-ES, en-US

# ── Integrations: Google / Gmail ─────────────────────────────────────────────
# Read-only Gmail for agents. Needs: pip install ".[google]"
# One-time setup: create a Google Cloud project, enable the Gmail API, make a
# "Desktop app" OAuth client, then: cortex connect gmail --client-secret <path>
# google_client_secret_path = "C:/path/to/client_secret.json"   # optional, else ~/.cortex/credentials/
gmail_enabled = true
gmail_scopes = ["https://www.googleapis.com/auth/gmail.readonly"]

# ── Memory ──────────────────────────────────────────────────────────────────
memory_enabled = true
memory_recall = 5

# ── Display ─────────────────────────────────────────────────────────────────
truncate_output = 3000

# ── Stats / savings reference price ─────────────────────────────────────────
# What you'd pay per 1M tokens on a comparable cloud model.
# Used only for the "saved $X" estimate in cortex stats — doesn't affect billing.
#
# Claude Sonnet 4.6 / GPT-4.1 (mid-tier, recommended):
cost_ref_input_per_1m  = 3.0
cost_ref_output_per_1m = 15.0
#
# Claude Haiku 4.5 (cheap but capable):
# cost_ref_input_per_1m  = 1.0
# cost_ref_output_per_1m = 5.0
#
# GPT-4o (historical reference):
# cost_ref_input_per_1m  = 2.5
# cost_ref_output_per_1m = 10.0

# ── Cloud providers (optional) ──────────────────────────────────────────────
# One key per provider — works for all their models.

# Kimi K2.6 (Moonshot AI) — best for long agent runs, 256K ctx
# Get key: https://platform.moonshot.cn
# kimi_api_key = "sk-..."
# Usage: cortex run -m moonshot-v1-128k "your task"

# Qwen3.6 (Alibaba) — top agentic coding, 1M ctx
# Get key: https://dashscope.aliyuncs.com
# qwen_api_key = "sk-..."
# Usage: cortex run -m qwen-plus "your task"

# GLM-5.1 (Zhipu AI) — UI/frontend specialist
# Get key: https://open.bigmodel.cn
# glm_api_key = "..."
# Usage: cortex run -m glm-4-plus "your task"

# Ollama Cloud — models with cloud icon in Ollama app
# Get key: https://ollama.com → Settings → API Keys
# ollama_cloud_api_key = "ollama-sk-..."
# Usage: cortex run -m ollama-cloud/llama3.3 "your task"

# ── Integrations ────────────────────────────────────────────────────────────
# Gmail: run `cortex connect gmail` (drops you a guided OAuth setup).
#
# Outlook / Microsoft 365: register a free Azure app, then set its client id here.
#   portal.azure.com → Entra ID → App registrations → New registration
#   (any org directory + personal accounts) → Authentication → Allow public client flows = Yes
#   → API permissions → Graph → Delegated: Mail.Read, Mail.Send, Mail.ReadWrite,
#     Sites.Read.All, Files.ReadWrite.All, offline_access, User.Read
#   (Sites/Files enable SharePoint — same login as email)
# microsoft_client_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
# microsoft_tenant    = "common"   # common = work + personal; or your tenant id/domain
# Then: cortex connect outlook   (covers Outlook AND SharePoint)
